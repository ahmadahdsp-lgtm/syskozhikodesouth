<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SYS</title>
    <meta name="robots" content="noindex, nofollow">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .admin-shell {
            min-height: 100vh;
            background: var(--color-off-white);
        }

        .admin-header {
            background: var(--color-white);
            border-bottom: 1px solid var(--color-light-gray);
            padding: var(--spacing-md) 0;
        }

        .admin-panel {
            border-radius: var(--radius-lg);
            background: var(--color-white);
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

<body class="admin-shell">

    <header class="admin-header sticky-top" style="z-index: 1020;">
        <div class="container d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-center gap-3">
                <a href="/index.html" class="logo mb-0 text-decoration-none">
                    <i class="ph-fill ph-leaf"></i>
                    SYS
                </a>
                <span class="text-muted small d-none d-sm-inline">Admin</span>
            </div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="small text-muted">
                    Signed in as <strong id="admin-display-name">Admin</strong>
                </span>
                <button type="button" class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-1"
                    id="logout-btn">
                    <i class="ph ph-sign-out"></i> Log out
                </button>
                <a href="/index.html" class="btn btn-white btn-sm d-inline-flex align-items-center gap-1">
                    <i class="ph ph-house"></i> Site home
                </a>
            </div>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="mb-4">
                <h1 class="h3 mb-1">Dashboard</h1>
                <p class="text-muted mb-0 small">Welcome to the SYS admin area. Add content and tools here as needed.</p>
            </div>

            <div class="row g-4">
                <div class="col-md-6 col-xl-4">
                    <div class="admin-panel p-4 h-100">
                        <div class="card-icon mb-3" style="width: 44px; height: 44px; font-size: 1.25rem;">
                            <i class="ph ph-chart-line-up"></i>
                        </div>
                        <h2 class="h5">Overview</h2>
                        <p class="small text-muted mb-0">Placeholder for metrics and quick stats.</p>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4">
                    <div class="admin-panel p-4 h-100">
                        <div class="card-icon mb-3" style="width: 44px; height: 44px; font-size: 1.25rem;">
                            <i class="ph ph-users-three"></i>
                        </div>
                        <h2 class="h5">People</h2>
                        <p class="small text-muted mb-0">Placeholder for member or volunteer lists.</p>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4">
                    <div class="admin-panel p-4 h-100">
                        <div class="card-icon mb-3" style="width: 44px; height: 44px; font-size: 1.25rem;">
                            <i class="ph ph-calendar-blank"></i>
                        </div>
                        <h2 class="h5">Events</h2>
                        <p class="small text-muted mb-0">Placeholder for upcoming events management.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="/scripts/admin-dashboard.js"></script>
</body>

</html>
