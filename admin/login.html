<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SYS</title>
    <meta name="robots" content="noindex, nofollow">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .login-page {
            min-height: calc(100vh - 72px);
            display: flex;
            align-items: center;
            padding: var(--spacing-2xl) var(--spacing-md);
            background: linear-gradient(160deg, var(--color-off-white) 0%, var(--color-light-gray) 100%);
        }

        .login-card {
            border-radius: var(--radius-lg);
            border: none;
            box-shadow: var(--shadow-lg);
        }

        .login-card .card-body {
            padding: var(--spacing-2xl);
        }

        .form-control:focus {
            border-color: var(--color-primary-light);
            box-shadow: 0 0 0 0.2rem rgba(20, 83, 62, 0.2);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top" style="z-index: 1030;">
        <div class="container">
            <a class="navbar-brand logo mb-0" href="/index.html">
                <i class="ph-fill ph-leaf"></i>
                SYS
            </a>
            <a href="/index.html" class="nav-link d-inline-flex align-items-center gap-2 py-2 fw-semibold"
                style="color: var(--color-primary-dark);">
                <i class="ph ph-house fs-5"></i>
                Home
            </a>
        </div>
    </nav>

    <main class="login-page flex-grow-1">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-5 col-xl-4">
                    <div class="card login-card">
                        <div class="card-body">
                            <div class="text-center mb-4">
                                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                                    style="width: 64px; height: 64px; background: rgba(20, 83, 62, 0.12); color: var(--color-primary);">
                                    <i class="ph-fill ph-lock-key" style="font-size: 2rem;"></i>
                                </div>
                                <h1 class="h3 mb-1">Admin login</h1>
                                <p class="text-muted small mb-0">Staff access to the SYS dashboard.</p>
                            </div>

                            <div class="alert alert-danger small py-2 d-none" id="admin-login-error" role="alert"></div>

                            <form id="admin-login-form" class="needs-validation" novalidate>
                                <div class="mb-3">
                                    <label for="admin-username" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="admin-username" name="username"
                                        autocomplete="username" required placeholder="Username">
                                    <div class="invalid-feedback">Enter your username.</div>
                                </div>
                                <div class="mb-4">
                                    <label for="admin-password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="admin-password" name="password"
                                        autocomplete="current-password" required placeholder="••••••••">
                                    <div class="invalid-feedback">Enter your password.</div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2" id="admin-login-submit">
                                    <i class="ph ph-sign-in"></i> Sign in
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-3 mt-auto">
        <div class="container text-center small text-muted">
            &copy; 2026 Sunni Yuvajana Sangham (SYS) Kerala
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="/scripts/admin-login.js"></script>
</body>

</html>
